# GenSec — VCASLU validation case

materials:
  concrete_direct:
    type: concrete
    fck: 50.0             # characteristic cylinder strength [MPa] (required)
    gamma_c: 1.5          # partial safety factor (default 1.5)
    alpha_cc: 0.85        # long-term coefficient (default 0.85)
    n_parabola: 2.0       # parabolic exponent (default 2.0)
    eps_c2: -0.002        # peak-stress strain (default -0.002)
    eps_cu2: -0.0035      # ultimate strain (default -0.0035)

  B450C:
    type: steel
    fyk: 450.0
    gamma_s: 1.15
    works_in_compression: true

section:
  B: 600
  H: 600
  bulk_material: concrete_direct
  n_fibers_y: 40
  n_fibers_x: 40
  rebars:
    - {x: 60, y: 60,   As: 531, material: B450C, n_bars: 1, diameter: 26}
