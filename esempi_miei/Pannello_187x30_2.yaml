# GenSec — VCASLU validation case

materials:
  concrete_direct:
    type: concrete
    fck: 50.0             # characteristic cylinder strength [MPa] (required)
    gamma_c: 1.5          # partial safety factor (default 1.5)
    alpha_cc: 0.85        # long-term coefficient (default 0.85)
    n_parabola: 2.0       # parabolic exponent (default 2.0)
    eps_c2: -0.002        # peak-stress strain (default -0.002)
    eps_cu2: -0.0035      # ultimate strain (default -0.0035)

  B450C:
    type: steel
    fyk: 450.0
    gamma_s: 1.15
    works_in_compression: true

section:
  B: 1870
  H: 300
  bulk_material: concrete_direct
  n_fibers_y: 100
  n_fibers_x: 40
  rebars:
    - {x: 50, y: 50, As: 531, material: B450C, n_bars: 1, diameter: 26}
    - {x: 150, y: 50, As: 531, material: B450C, n_bars: 1, diameter: 26}
    - {x: 1160, y: 50, As: 314, material: B450C, n_bars: 1, diameter: 20}
    - {x: 1720, y: 50, As: 314, material: B450C, n_bars: 1, diameter: 20}
    - {x: 1820, y: 50, As: 314, material: B450C, n_bars: 1, diameter: 20}
    - {x: 50, y: 150, As: 531, material: B450C, n_bars: 1, diameter: 26}
    - {x: 50, y: 250, As: 531, material: B450C, n_bars: 1, diameter: 26}
    - {x: 150, y: 250, As: 531, material: B450C, n_bars: 1, diameter: 26}
    - {x: 1160, y: 250, As: 314, material: B450C, n_bars: 1, diameter: 20}
    - {x: 1720, y: 250,  As: 314, material: B450C, n_bars: 1, diameter: 20}
    - {x: 1820, y: 250,  As: 314, material: B450C, n_bars: 1, diameter: 20}
demands:
  - name: 1
    N_kN: 0
    Mx_kNm: 207.93
    My_kNm: -240.79
 
output:
  eta_3D: true
  eta_2D: true
  generate_mx_my: true
  generate_3d_surface: true
  n_angles_mx_my: 144
