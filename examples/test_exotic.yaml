# ================================================================
#  OUTPUT — flags and options
# ================================================================

output:
  # ── Utilization ratio flags ──
  eta_3D: false             # default: true
  eta_2D: false             # default: false
  eta_cv: true             # default: true  (informational, recommended for cross-software comparison)
  eta_path: false           # default: true
  eta_path_2D: false        # default: false
  delta_N_tol: 0.03        # default: 0.03 (3%)

  # ── Domain generation ──
  generate_mx_my: false     # Mx-My contour plots (default: false)
  generate_3d_surface: false # 3D surface CSV/JSON/plot (default: false)
  n_angles_mx_my: 144      # angular resolution for Mx-My (default: 144)

  # ── Moment-curvature and ductility ──
  generate_moment_curvature: false     # M-χ diagrams per N level (default: true)
  generate_polar_ductility: false      # polar ductility plot (default: true)
  generate_3d_moment_curvature: false  # 3D M-χ-N surface (default: true)

  # ── N-level strategy ──
  n_levels_mode: demands
  # n_levels_count: 10
  # n_levels_values: [-3000, -1500, 0]
