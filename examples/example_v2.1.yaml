materials:
  C25:
    type: concrete_ec2
    class: C25/30
    ls: F
    loadtype: slow
    TypeConc: R

  B450C:
    type: steel
    fyk: 450.0
    gamma_s: 1.15
    works_in_compression: true

section:
  B: 300
  H: 500
  bulk_material: C25
  n_fibers_y: 40
  n_fibers_x: 20
  rebars:
    - {x: 30, y: 30,   As: 201.06, material: B450C, n_bars: 1, diameter: 8}
    - {x: 30, y: 250,  As: 201.06, material: B450C, n_bars: 1, diameter: 8}
    - {x: 30, y: 470,  As: 201.06, material: B450C, n_bars: 1, diameter: 8}
    - {x: 270, y: 30,  As: 201.06, material: B450C, n_bars: 1, diameter: 8}
    - {x: 270, y: 250, As: 201.06, material: B450C, n_bars: 1, diameter: 8}
    - {x: 270, y: 470, As: 201.06, material: B450C, n_bars: 1, diameter: 8}

# ── Base demands (individual load cases) ──
demands:
  - name: G
    N_kN: -500
    Mx_kNm: 20
    My_kNm: 5

  - name: Q1
    N_kN: -100
    Mx_kNm: 40
    My_kNm: 10

  - name: Ex
    N_kN: 50
    Mx_kNm: 80
    My_kNm: 60

  - name: Ey
    N_kN: 20
    Mx_kNm: 30
    My_kNm: 90

# ── Combinations ──
combinations:
  # Simple: factored sum, no stages
  - name: SLU_1
    components:
      - {ref: G, factor: 1.3}
      - {ref: Q1, factor: 1.5}

  # Staged: gravity base + seismic increment
  - name: SLU_sismico_Ex
    stages:
      - name: gravitazionale
        components:
          - {ref: G, factor: 1.0}
          - {ref: Q1, factor: 0.3}
      - name: sisma
        components:
          - {ref: Ex, factor: 1.0}

  # Staged: gravity + seismic Y
  - name: SLU_sismico_Ey
    stages:
      - name: gravitazionale
        components:
          - {ref: G, factor: 1.0}
          - {ref: Q1, factor: 0.3}
      - name: sisma
        components:
          - {ref: Ey, factor: 1.0}

# ── Envelopes ──
envelopes:
  # Envelope of combinations
  - name: Envelope_SLU
    members:
      - {ref: SLU_1}
      - {ref: SLU_sismico_Ex}
      - {ref: SLU_sismico_Ey}

  # Envelope with inline demands
  - name: Envelope_diretto
    members:
      - {ref: G}
      - {N_kN: -800, Mx_kNm: 60, My_kNm: 25}
      - {N_kN: -300, Mx_kNm: 90, My_kNm: 40}

# ── Output flags ──
output:
  # Utilization flags
  eta_3D: true
  eta_2D: true
  eta_path: true
  eta_path_2D: true
  delta_N_tol: 0.03

  # Domain generation
  generate_mx_my: true
  generate_3d_surface: true
  n_angles_mx_my: 144
