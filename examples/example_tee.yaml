# GenSec — T-section example (generic format)

materials:
  concrete_1:
    type: concrete_ec2_gen1
    class: C25/30

  steel_1:
    type: steel
    fyk: 450.0
    gamma_s: 1.15
    Es: 200000
    k_hardening: 1.0
    eps_su: 0.01
    works_in_compression: true

section:
  shape: tee
  params:
    bf: 800
    hf: 150
    bw: 300
    hw: 450
  bulk_material: concrete_1
  mesh_size: 15
  mesh_method: grid
  rebars:
    - {y: 40, x: 310, As: 314.16, material: steel_1, n_bars: 2, diameter: 20}
    - {y: 40, x: 490, As: 314.16, material: steel_1, n_bars: 2, diameter: 20}
    - {y: 560, x: 250, As: 628.32, material: steel_1, n_bars: 4, diameter: 20}
    - {y: 560, x: 550, As: 628.32, material: steel_1, n_bars: 4, diameter: 20}

demands:
  - name: Gravity
    N_kN: -500
    Mx_kNm: 350
    My_kNm: 0
  - name: Seismic
    N_kN: -200
    Mx_kNm: 500
    My_kNm: 0

output:
  eta_3D: true
  generate_mx_my: true
  generate_3d_surface: true
  n_angles_mx_my: 144
  generate_moment_curvature: false
  generate_polar_ductility: false
  generate_3d_moment_curvature: false
