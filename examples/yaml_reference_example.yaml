# ================================================================
#  GenSec v0.2.0 — YAML Reference Input File
# ================================================================
#
#  This file documents every supported key with inline comments.
#  It is a valid input file and can be run as-is.
#
#  Usage:
#    uv run gensec run yaml_reference_example.yaml --output-dir results/
#
#  Regenerate a plot from exported data:
#    uv run gensec plot results/mx_chi_N0.json
#
# ================================================================


# ================================================================
#  MATERIALS
# ================================================================
#  Named material definitions.  Each key becomes the identifier
#  used in the section block.

materials:

  # --- Concrete: direct parameters ---
  # Use when you want full control over constitutive parameters.
  # Type: concrete_ec2_gen1_custom  (legacy alias: concrete)
  concrete_direct:
    type: concrete_ec2_gen1_custom
    fck: 25.0             # characteristic cylinder strength [MPa] (required)
    gamma_c: 1.5          # partial safety factor (default 1.5)
    alpha_cc: 0.85        # long-term coefficient (default 0.85)
    n_parabola: 2.0       # parabolic exponent (default 2.0)
    eps_c2: -0.002        # peak-stress strain (default -0.002)
    eps_cu2: -0.0035      # ultimate strain (default -0.0035)
    # fct: 0.0            # tensile strength [MPa] (default 0 = no tension)
    # Ec: 0.0             # elastic modulus [MPa] for tension (default 0)

  # --- Concrete: from EC2 class ---
  # All Table 3.1 properties (fcm, fctm, Ecm, eps_c2, eps_cu2, n)
  # are computed automatically.  Enables cracking detection in M-chi.
  # Type: concrete_ec2_gen1  (legacy alias: concrete_ec2)
  C30:
    type: concrete_ec2_gen1
    class: C30/37          # EC2 class: C12/15 … C90/105
    ls: F                  # limit state: 'F' fundamental, 'A' accidental, 'S' service
    loadtype: slow         # 'slow' or 'fast' (default 'slow')
    TypeConc: R            # cement type: 'R' rapid, 'N' normal, 'S' slow
    enable_tension: false  # activate linear tension branch (default false)
    tension_fct: fctd      # which fct: 'fctd', 'fctm', or 'fctk'
    # NA: French           # National Annex (default 'French', only one available)
    # time: 28             # concrete age [days] (default 28)

  # --- Reinforcing steel ---
  B450C:
    type: steel
    fyk: 450.0             # characteristic yield strength [MPa] (required)
    gamma_s: 1.15          # partial safety factor (default 1.15)
    Es: 200000             # Young's modulus [MPa] (default 200000)
    k_hardening: 1.0       # ft/fy ratio; 1.0 = perfectly plastic (default 1.0)
    eps_su: 0.0675         # ultimate strain (default 0.01)
    works_in_compression: true  # set false for FRP or tension-only materials

  # --- Tabulated material (any sigma-epsilon curve) ---
  # Piecewise-linear.  Strain outside range => sigma = 0.
  # cfrp_sheet:
  #   type: tabulated
  #   name: CFRP_200GPa
  #   strains:  [0.0, 0.017]
  #   stresses: [0.0, 2800.0]


# ================================================================
#  SECTION
# ================================================================
#  Two formats: legacy rectangular (B + H) or generic (shape + params).
#
#  Legacy rectangular:
#    n_fibers_y controls the mesh resolution.  When n_fibers_x is
#    omitted or set to 1, an isotropic grid is used (same cell size
#    in both directions).  Set n_fibers_x > 1 for explicit control.

section:
  B: 400                   # width [mm]
  H: 600                   # height [mm]
  bulk_material: C30       # reference to materials block
  n_fibers_y: 40           # fiber count along height
  n_fibers_x: 20           # >1 = explicit x resolution; 1 = isotropic grid

  # --- Generic format (uncomment to use instead) ---
  # shape: tee             # rect, circle, annulus, tee, inv_tee, h, box,
  #                        # single_tee, double_tee, custom
  # params:
  #   bf: 800              # shape-specific parameters
  #   hf: 150
  #   bw: 300
  #   hw: 450
  # bulk_material: C30
  # mesh_size: 15          # target fiber edge length [mm]
  # mesh_method: grid      # 'grid' (default) or 'triangle'

  rebars:
    # Each rebar needs: y, material, and EITHER As OR diameter.
    # If both As and diameter are given, As takes precedence.
    # If only diameter is given, As = n_bars * pi/4 * d^2.
    # x is required for biaxial sections.

    # Example with explicit As:
    - {y: 45, x: 50,  As: 490.87, material: B450C, n_bars: 1, diameter: 25}
    - {y: 45, x: 200, As: 314.16, material: B450C, n_bars: 1, diameter: 20}
    - {y: 45, x: 350, As: 490.87, material: B450C, n_bars: 1, diameter: 25}

    # Example with diameter only (As computed automatically):
    - {y: 555, x: 50,  diameter: 25, material: B450C}
    - {y: 555, x: 200, diameter: 20, material: B450C}
    - {y: 555, x: 350, diameter: 25, material: B450C}

    # Mid-height bars:
    - {y: 300, x: 50,  diameter: 16, material: B450C}
    - {y: 300, x: 350, diameter: 16, material: B450C}


# ================================================================
#  DEMANDS — individual load cases
# ================================================================
#  Units: N_kN [kN], Mx_kNm [kN·m], My_kNm [kN·m].
#  Sign convention: N > 0 = tension; M per right-hand rule.

demands:
  - name: G
    N_kN: -2000
    Mx_kNm: 150
    My_kNm: 0

  - name: Q1
    N_kN: -500
    Mx_kNm: 80
    My_kNm: 30

  - name: Ex
    N_kN: 100
    Mx_kNm: 200
    My_kNm: 100

  - name: Ey
    N_kN: 50
    Mx_kNm: 100
    My_kNm: 180


# ================================================================
#  COMBINATIONS — factored sums of demands, optionally staged
# ================================================================

combinations:
  - name: SLU_1
    components:
      - {ref: G, factor: 1.3}
      - {ref: Q1, factor: 1.5}

  - name: SLU_sismico_Ex
    stages:
      - name: gravitazionale
        components:
          - {ref: G, factor: 1.0}
          - {ref: Q1, factor: 0.3}
      - name: sisma_Ex
        components:
          - {ref: Ex, factor: 1.0}

  - name: SLU_sismico_Ey
    stages:
      - name: gravitazionale
        components:
          - {ref: G, factor: 1.0}
          - {ref: Q1, factor: 0.3}
      - name: sisma_Ey
        components:
          - {ref: Ey, factor: 1.0}


# ================================================================
#  ENVELOPES — max eta among members
# ================================================================

envelopes:
  - name: Envelope_SLU_sismico
    members:
      - {ref: SLU_sismico_Ex}
      - {ref: SLU_sismico_Ey}

  - name: Envelope_diretto
    members:
      - {ref: G}
      - {N_kN: -2500, Mx_kNm: 100, My_kNm: 50}
      - {N_kN: -1500, Mx_kNm: 250, My_kNm: 120}
      - {N_kN: -1000, Mx_kNm: 200, My_kNm: 150}


# ================================================================
#  OUTPUT — flags and options
# ================================================================

output:
  # ── Utilization ratio flags ──
  eta_3D: true             # default: true
  eta_2D: true             # default: false
  eta_path: true           # default: true
  eta_path_2D: true        # default: false
  delta_N_tol: 0.03        # default: 0.03 (3%)

  # ── Domain generation ──
  generate_mx_my: true     # Mx-My contour plots (default: false)
  generate_3d_surface: true # 3D surface CSV/JSON/plot (default: false)
  n_angles_mx_my: 144      # angular resolution for Mx-My (default: 144)

  # ── Moment-curvature and ductility ──
  generate_moment_curvature: true     # M-χ diagrams per N level (default: true)
  generate_polar_ductility: true      # polar ductility plot (default: true)
  generate_3d_moment_curvature: true  # 3D M-χ-N surface (default: true)

  # ── N-level strategy ──
  n_levels_mode: demands
  # n_levels_count: 10
  # n_levels_values: [-3000, -1500, 0]
