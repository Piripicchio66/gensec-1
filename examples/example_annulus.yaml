# GenSec — annular (hollow circular) pile section

materials:
  concrete_1:
    type: concrete_ec2_gen1
    class: C35/45

  steel_1:
    type: steel
    fyk: 500.0
    gamma_s: 1.15
    Es: 200000
    k_hardening: 1.05
    eps_su: 0.0675
    works_in_compression: true

section:
  shape: annulus
  params:
    D_ext: 1200
    D_int: 800
    resolution: 64
  bulk_material: concrete_1
  mesh_size: 25
  mesh_method: grid
  rebars:
    - {y: 600,  x: 1140, As: 490.87, material: steel_1, diameter: 25}
    - {y: 870,  x: 1067, As: 490.87, material: steel_1, diameter: 25}
    - {y: 1067, x: 870,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 1140, x: 600,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 1067, x: 330,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 870,  x: 133,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 600,  x: 60,   As: 490.87, material: steel_1, diameter: 25}
    - {y: 330,  x: 133,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 133,  x: 330,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 60,   x: 600,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 133,  x: 870,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 330,  x: 1067, As: 490.87, material: steel_1, diameter: 25}

demands:
  - name: Gravity
    N_kN: -3000
    Mx_kNm: 800
    My_kNm: 0
  - name: Seismic
    N_kN: -1500
    Mx_kNm: 1200
    My_kNm: 600

output:
  eta_3D: true
  eta_2D: true
  generate_mx_my: true
  generate_3d_surface: true
  n_angles_mx_my: 144
  generate_moment_curvature: false
  generate_polar_ductility: false
  generate_3d_moment_curvature: false
