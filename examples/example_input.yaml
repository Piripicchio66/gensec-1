      As: 942.5
      material: steel_1
      n_bars: 3
      diameter: 20
    - y: 300
      As: 402.1
      material: steel_1
      n_bars: 2
      diameter: 16
    - y: 560
      As: 942.5
      material: steel_1
      n_bars: 3
