# GenSec — VCASLU validation case

materials:
  concrete_direct:
    type: concrete_ec2_gen1
    class: C50/60

  B450C:
    type: steel
    fyk: 450.0
    gamma_s: 1.15
    k_hardening: 1.15       # ft/fy ratio; 1.0 = perfectly plastic (default 1.0)
    eps_su: 0.075         # ultimate strain (default 0.01)
    works_in_compression: true
    Es: 200000.0          # Young's modulus [MPa] (required)

section:
  B: 1870
  H: 300
  bulk_material: concrete_direct
  n_fibers_y: 120
  n_fibers_x: 60
  rebars:
    - {y: 50, x: 50, material: B450C, n_bars: 1, diameter: 26}
    - {y: 50, x: 150, material: B450C, n_bars: 1, diameter: 26}
    - {y: 50, x: 1160, material: B450C, n_bars: 1, diameter: 20}
    - {y: 50, x: 1720, material: B450C, n_bars: 1, diameter: 20}
    - {y: 50, x: 1820, material: B450C, n_bars: 1, diameter: 20}
    - {y: 150, x: 50, material: B450C, n_bars: 1, diameter: 26}
    - {y: 250, x: 50, material: B450C, n_bars: 1, diameter: 26}
    - {y: 250, x: 150, material: B450C, n_bars: 1, diameter: 26}
    - {y: 250, x: 1160, material: B450C, n_bars: 1, diameter: 20}
    - {y: 250, x: 1720, material: B450C, n_bars: 1, diameter: 20}
    - {y: 250, x: 1820, material: B450C, n_bars: 1, diameter: 20}
demands:
  - name: 1
    N_kN: 0
    Mx_kNm: 207.93
    My_kNm: -240.79
 
output:

  
  # ── Utilization ratio flags ──
  eta_norm: true               # default: true (recommended principal 3-D metric)
  eta_norm_beta: true          # default: true (composite ratio, also useful for cross-software comparison)
  eta_norm_ray: true          # default: false (opt-in, for proportional load amplification)
  eta_2D: true                 # default: false (opt-in, slower; biaxial only)
  eta_path: false               # default: false (opt-in, for staged loading)
  eta_path_norm_beta: false     # default: false (opt-in, useful for seismic + staged gravity)
  eta_path_2D: false            # default: false (opt-in)
  delta_N_tol: 0.001        # default: 0.03 (3%)

  # ── Domain generation ──
  generate_mx_my: true     # Mx-My contour plots (default: false)
  generate_3d_surface: true # 3D surface CSV/JSON/plot (default: false)
  n_angles_mx_my: 360 #144      # angular resolution for Mx-My (default: 144)

  # ── Moment-curvature and ductility ──
  generate_moment_curvature: true     # M-χ diagrams per N level (default: true)
  generate_polar_ductility: false      # polar ductility plot (default: true)
  generate_3d_moment_curvature: false  # 3D M-χ-N surface (default: true)

  # ── N-level strategy ──
  n_levels_mode: demands
  #n_levels_count: 10
  # n_levels_values: [-3000, -1500, 0]
