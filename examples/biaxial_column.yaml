# GenSec — biaxial column with envelope

materials:
  C30:
    type: concrete_ec2
    class: C30/37
    ls: F
    loadtype: slow
    TypeConc: R

  B450C:
    type: steel
    fyk: 450.0
    gamma_s: 1.15
    works_in_compression: true

section:
  B: 400
  H: 600
  bulk_material: C30
  n_fibers_y: 40
  n_fibers_x: 20
  rebars:
    - {y: 45, x: 45,   As: 314.16, material: B450C, n_bars: 1, diameter: 20}
    - {y: 45, x: 355,  As: 314.16, material: B450C, n_bars: 1, diameter: 20}
    - {y: 555, x: 45,  As: 314.16, material: B450C, n_bars: 1, diameter: 20}
    - {y: 555, x: 355, As: 314.16, material: B450C, n_bars: 1, diameter: 20}
    - {y: 45, x: 200,  As: 201.06, material: B450C, n_bars: 1, diameter: 16}
    - {y: 555, x: 200, As: 201.06, material: B450C, n_bars: 1, diameter: 16}
    - {y: 300, x: 45,  As: 201.06, material: B450C, n_bars: 1, diameter: 16}
    - {y: 300, x: 355, As: 201.06, material: B450C, n_bars: 1, diameter: 16}

demands:
  - name: Gravity
    N_kN: -2000
    Mx_kNm: 150
    My_kNm: 0
  - name: Seismic_biax
    N_kN: -1500
    Mx_kNm: 200
    My_kNm: 100

envelopes:
  - name: Envelope_SLU
    members:
      - {N_kN: -2500, Mx_kNm: 100, My_kNm: 50}
      - {N_kN: -2000, Mx_kNm: 200, My_kNm: 80}
      - {N_kN: -1500, Mx_kNm: 250, My_kNm: 120}
      - {N_kN: -1000, Mx_kNm: 200, My_kNm: 150}
      - {N_kN: -800,  Mx_kNm: 150, My_kNm: 100}
      - {N_kN: -1800, Mx_kNm: 180, My_kNm: 60}

output:
  eta_3D: true
  eta_2D: true
  generate_mx_my: true
  generate_3d_surface: true
  n_angles_mx_my: 144
