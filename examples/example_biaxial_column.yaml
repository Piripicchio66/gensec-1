# GenSec — biaxial column with auto N-levels

materials:
  concrete_1:
    type: concrete_ec2_gen1
    class: C30/37

  steel_1:
    type: steel
    fyk: 450.0
    gamma_s: 1.15
    Es: 200000
    k_hardening: 1.0
    eps_su: 0.01
    works_in_compression: true

section:
  B: 400
  H: 600
  bulk_material: concrete_1
  n_fibers_y: 40
  n_fibers_x: 30
  rebars:
    - {y: 40, x: 50,   As: 490.87, material: steel_1, diameter: 25}
    - {y: 40, x: 350,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 560, x: 50,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 560, x: 350, As: 490.87, material: steel_1, diameter: 25}
    - {y: 40, x: 200,  As: 314.16, material: steel_1, diameter: 20}
    - {y: 560, x: 200, As: 314.16, material: steel_1, diameter: 20}
    - {y: 300, x: 50,  As: 314.16, material: steel_1, diameter: 20}
    - {y: 300, x: 350, As: 314.16, material: steel_1, diameter: 20}

demands:
  - name: Gravity
    N_kN: -1500
    Mx_kNm: 200
    My_kNm: 0
  - name: Seismic_x
    N_kN: -1200
    Mx_kNm: 350
    My_kNm: 0
  - name: Seismic_biax
    N_kN: -1500
    Mx_kNm: 200
    My_kNm: 100

output:
  eta_3D: true
  eta_2D: true
  generate_mx_my: true
  generate_3d_surface: true
  n_levels_mode: auto
  n_levels_count: 5
  n_angles_mx_my: 144
  generate_moment_curvature: true
  generate_polar_ductility: true
  generate_3d_moment_curvature: true
