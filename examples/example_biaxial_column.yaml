# GenSec — biaxial column example
# Demonstrates all analysis output options

materials:
  concrete_1:
    type: concrete_ec2
    class: C30/37

  steel_1:
    type: steel
    fyk: 450.0
    gamma_s: 1.15
    Es: 200000
    k_hardening: 1.0
    eps_su: 0.01
    works_in_compression: true

section:
  B: 400
  H: 600
  bulk_material: concrete_1
  n_fibers_y: 40
  n_fibers_x: 30
  rebars:
    - {y: 40, x: 50,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 40, x: 350, As: 490.87, material: steel_1, diameter: 25}
    - {y: 560, x: 50,  As: 490.87, material: steel_1, diameter: 25}
    - {y: 560, x: 350, As: 490.87, material: steel_1, diameter: 25}
    - {y: 40, x: 200, As: 314.16, material: steel_1, diameter: 20}
    - {y: 560, x: 200, As: 314.16, material: steel_1, diameter: 20}
    - {y: 300, x: 50,  As: 314.16, material: steel_1, diameter: 20}
    - {y: 300, x: 350, As: 314.16, material: steel_1, diameter: 20}

demands:
  - name: Gravity
    N_kN: -1500
    Mx_kNm: 200
  - name: Seismic_x
    N_kN: -1200
    Mx_kNm: 350
    My_kNm: 0
  - name: Seismic_biax
    N_kN: -1500
    Mx_kNm: 200
    My_kNm: 100

output:
  generate_mx_my: true
  generate_3d_surface: true

  # N-level strategy for M-chi and Mx-My diagrams:
  #   "demands"  → one per unique demand N (default)
  #   "auto"     → discretize from Nmin to Nmax of the domain
  #   "explicit" → user-specified list of N values [kN]
  n_levels_mode: auto
  n_levels_count: 5

  # Alternative: explicit N values
  # n_levels_mode: explicit
  # n_levels_values: [-3000, -1500, -500, 0]
  
  n_angles_mx_my: 144  